name: Build VietFontConverter.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --onefile --noconsole --name "VietFontConverter" viet_font_converter.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VietFontConverter
          path: dist/VietFontConverter.exe
